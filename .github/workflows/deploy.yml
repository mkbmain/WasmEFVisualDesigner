name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Format check
        run: dotnet format EfSchemaVisualizer.slnx --verify-no-changes

      - name: Test
        run: dotnet test EfSchemaVisualizer.slnx --configuration Release

      - name: Publish
        run: dotnet publish src/EfSchemaVisualizer.Web/EfSchemaVisualizer.Web.csproj -c Release -o publish

      - name: Install Playwright Chromium
        run: pwsh tests/EfSchemaVisualizer.SmokeTests/bin/Release/net10.0/playwright.ps1 install chromium --with-deps

      - name: Smoke test — published app boots in a real browser
        run: dotnet test tests/EfSchemaVisualizer.SmokeTests --configuration Release --no-build
        env:
          SMOKE_TEST_PUBLISH_DIR: ${{ github.workspace }}/publish/wwwroot

      - name: Patch base href for GitHub Pages subpath
        run: |
          file=publish/wwwroot/index.html
          before=$(grep -c '<base [^>]*href="/"[^>]*>' "$file" || true)
          if [ "$before" -eq 0 ]; then
            echo "::error::No '<base href=\"/\">' tag found in $file — the Blazor template must have changed. Update the patch step instead of deploying a broken base href." >&2
            exit 1
          fi
          sed -i -E 's#<base ([^>]*)href="/"([^>]*)>#<base \1href="/WasmEFVisualDesigner/"\2>#' "$file"
          after=$(grep -c 'href="/WasmEFVisualDesigner/"' "$file" || true)
          if [ "$after" -eq 0 ]; then
            echo "::error::base href patch did not apply to $file" >&2
            exit 1
          fi

      - name: Disable Jekyll processing
        run: touch publish/wwwroot/.nojekyll

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: publish/wwwroot

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
